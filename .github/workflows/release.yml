# Builds a signed release APK and attaches it to the GitHub release
# whenever a version tag (v*) is pushed.
#
# Required repository secrets:
#   SIGNING_KEYSTORE_BASE64   – base64 of signing/thor-release.jks
#   SIGNING_STORE_PASSWORD    – keystore password
#   SIGNING_KEY_ALIAS         – key alias (thor)
#   SIGNING_KEY_PASSWORD      – key password
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, e.g. v0.4.0"
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Validate signing secrets
        run: |
          missing=0
          for name in SIGNING_KEYSTORE_BASE64 SIGNING_STORE_PASSWORD SIGNING_KEY_ALIAS SIGNING_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not configured."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}

      - name: Decode keystore
        run: |
          mkdir -p signing
          echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > signing/thor-release.jks
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Build signed release APK
        run: ./gradlew assembleRelease
        env:
          SIGNING_STORE_FILE: thor-release.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/release/app-release.apk \
             ThorROMButler-${{ env.RELEASE_TAG }}.apk

      - name: Prepare release notes
        run: |
          notes_path="docs/release-notes/${RELEASE_TAG}.md"
          if [ -f "$notes_path" ]; then
            cp "$notes_path" release-notes.md
          elif gh release view "$RELEASE_TAG" --json body --jq .body > release-notes.md; then
            if [ ! -s release-notes.md ]; then
              echo "::error::Existing release has empty notes."
              exit 1
            fi
          else
            echo "::error::Missing $notes_path. Release notes must be bilingual (DE/EN)."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: release-notes.md
          files: ThorROMButler-${{ env.RELEASE_TAG }}.apk
          overwrite_files: true
