name: Bug report
description: Report a problem with scanning, detection, extraction, updates, or UI.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Thor ROM Butler. Please do not attach ROMs or copyrighted files.
  - type: input
    id: app-version
    attributes:
      label: App version
      placeholder: "0.4.0"
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device and Android version
      placeholder: "AYN Thor, Android 13"
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Scan
        - Detection
        - Review / assignment
        - Extraction / moving
        - Update check
        - Settings
        - Other
    validations:
      required: true
  - type: input
    id: archive
    attributes:
      label: Archive type and size
      placeholder: "7z, 3.2 GB, LZMA2 if known"
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Put archive in Downloads\n2. Scan\n3. Tap Sort in ROMs"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: log
    attributes:
      label: Log output
      description: Use the Log screen's share button when possible.
      render: text
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Optional. Blur file names if needed.
